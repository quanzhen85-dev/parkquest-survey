<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParkQuest 踩点助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0f;
            --card: #12121a;
            --primary: #00d4ff;
            --primary-dark: #00a8cc;
            --accent: #ff6b35;
            --text: #ffffff;
            --text-secondary: #8b8b9a;
            --border: #1e1e2e;
            --success: #00ff88;
            --warning: #ffcc00;
            --error: #ff3366;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 2px solid var(--primary);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                linear-gradient(90deg, transparent 50%, rgba(0,212,255,0.03) 50%),
                linear-gradient(0deg, transparent 50%, rgba(0,212,255,0.03) 50%);
            background-size: 20px 20px;
            pointer-events: none;
        }

        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            position: relative;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Panel */
        .panel {
            background: var(--card);
            margin: 15px;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,212,255,0.1);
        }

        .hidden { display: none !important; }

        h3 {
            color: var(--primary);
            margin-bottom: 20px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,212,255,0.2);
        }

        .form-group small {
            display: block;
            margin-top: 6px;
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        /* Buttons */
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--bg);
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .btn-ai {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #9d4edd 0%, #ff006e 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
        }

        .btn-upload {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--success) 0%, #00cc66 100%);
            color: var(--bg);
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
        }

        .btn-upload:disabled {
            background: var(--border);
            cursor: not-allowed;
        }

        /* GPS Status */
        .gps-status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: rgba(0,212,255,0.1);
            border: 1px solid var(--primary);
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .gps-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .gps-icon {
            font-size: 1.5rem;
        }

        .gps-text {
            font-weight: 500;
        }

        .gps-coords {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-family: monospace;
            margin-bottom: 20px;
            padding: 8px;
            background: var(--bg);
            border-radius: 8px;
        }

        .btn-small {
            padding: 8px 16px;
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* AI Section */
        .ai-section {
            background: linear-gradient(135deg, rgba(157,78,221,0.1) 0%, rgba(255,0,110,0.1) 100%);
            border: 1px solid rgba(157,78,221,0.3);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .ai-section h3 {
            color: #ff006e;
        }

        .hint {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 15px;
        }

        /* Voice Button */
        .voice-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent) 0%, #ff8c42 100%);
            border: none;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255,107,53,0.4);
            transition: all 0.3s;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .voice-btn:active {
            transform: scale(0.95);
        }

        .voice-btn.recording {
            animation: pulse 1s infinite;
            background: linear-gradient(135deg, #ff006e 0%, #ff3366 100%);
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,0,110,0.7); }
            50% { box-shadow: 0 0 0 20px rgba(255,0,110,0); }
        }

        .voice-hint {
            font-size: 0.6rem;
            color: white;
            margin-top: 2px;
        }

        /* Input with voice */
        .input-with-voice {
            display: flex;
            gap: 10px;
        }

        .voice-small-btn {
            padding: 12px 16px;
            background: var(--border);
            border: 1px solid var(--primary);
            border-radius: 12px;
            font-size: 1.2rem;
            cursor: pointer;
        }

        /* Photo */
        .photo-section {
            margin: 20px 0;
        }

        .photo-section label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: block;
        }

        .photo-area {
            width: 100%;
            aspect-ratio: 4/3;
            background: var(--bg);
            border: 2px dashed var(--border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            position: relative;
            transition: all 0.3s;
        }

        .photo-area:hover {
            border-color: var(--primary);
        }

        .photo-placeholder {
            text-align: center;
            color: var(--text-secondary);
        }

        .camera-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 10px;
        }

        .photo-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0; left: 0;
        }

        /* Saved list */
        .saved-item {
            background: var(--bg);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
        }

        .saved-item h4 {
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .saved-item p {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-family: monospace;
        }

        .btn-delete {
            padding: 8px 14px;
            background: var(--error);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .empty-hint {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid var(--border);
            max-width: 300px;
            width: 90%;
        }

        .voice-wave {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .voice-wave.recording {
            animation: wave 1s infinite;
        }

        @keyframes wave {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .voice-result {
            margin-top: 15px;
            padding: 12px;
            background: var(--bg);
            border-radius: 12px;
            min-height: 50px;
            color: var(--text-secondary);
            word-break: break-all;
        }

        .btn-cancel {
            margin-top: 20px;
            padding: 12px 30px;
            background: var(--border);
            border: 1px solid var(--text-secondary);
            color: var(--text);
            border-radius: 12px;
            cursor: pointer;
        }

        /* Loading */
        .loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10,10,15,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1001;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card);
            color: var(--text);
            padding: 16px 24px;
            border-radius: 12px;
            border: 1px solid var(--primary);
            font-size: 0.9rem;
            z-index: 1002;
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(0,212,255,0.3);
        }
    </style>
    <!-- 腾讯云开发 CloudBase SDK -->
    <script src="https://imgcache.qq.com/qcloud/tcbjs/1.10.0/tcb.js"></script>
</head>
<body>
    <div id="app">
        <!-- 头部 -->
        <header class="header">
            <h1>ParkQuest</h1>
            <p class="subtitle">踩点助手 v1.0</p>
        </header>

        <!-- 配置面板 -->
        <div id="config-panel" class="panel">
            <h3>⚙️ 系统配置</h3>
            <div class="form-group">
                <label>腾讯云环境 ID</label>
                <input type="text" id="tcb-envid" placeholder="例如：parkquest-xxx">
                <small>在腾讯云控制台 → 环境概览查看</small>
            </div>
            <div class="form-group">
                <label>通义千问 API Key</label>
                <input type="password" id="qwen-apikey" placeholder="sk-...">
                <small>仅保存在本地浏览器</small>
            </div>
            <button class="btn-primary" onclick="saveConfig()">启动系统</button>
        </div>

        <!-- 主界面 -->
        <div id="main-panel" class="panel hidden">
            <!-- GPS 状态 -->
            <div class="gps-status" id="gps-status">
                <div class="gps-info">
                    <span class="gps-icon">📍</span>
                    <span class="gps-text" id="gps-text">定位中...</span>
                </div>
                <button class="btn-small" onclick="refreshGPS()">刷新</button>
            </div>
            <div id="gps-coords" class="gps-coords">等待 GPS 信号...</div>

            <!-- AI 共创 -->
            <div class="ai-section">
                <h3>🤖 AI 剧情生成</h3>
                <p class="hint">描述场景，AI 自动生成任务内容</p>
                <div style="display:flex;justify-content:center;margin:20px 0;">
                    <button class="voice-btn" id="ai-voice-btn"
                            ontouchstart="startAIVoice(event)"
                            ontouchend="stopAIVoice()"
                            onmousedown="startAIVoice(event)"
                            onmouseup="stopAIVoice()">
                        🎤
                        <span class="voice-hint">按住说话</span>
                    </button>
                </div>
                <textarea id="ai-prompt" placeholder="例如：这里有个石狮子，我想做一个历史探秘的主题..."></textarea>
                <button class="btn-ai" onclick="generateWithAI()">✨ AI 生成内容</button>
            </div>

            <!-- 任务点表单 -->
            <div class="form-section">
                <h3>📝 任务点信息</h3>

                <div class="form-group">
                    <label>名称</label>
                    <div class="input-with-voice">
                        <input type="text" id="task-name" placeholder="例如：神秘石狮子">
                        <button class="voice-small-btn" onclick="startVoiceInput('task-name')">🎤</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>线索提示</label>
                    <div class="input-with-voice">
                        <input type="text" id="task-clue" placeholder="给玩家的线索">
                        <button class="voice-small-btn" onclick="startVoiceInput('task-clue')">🎤</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>详细提示</label>
                    <div class="input-with-voice">
                        <textarea id="task-hint" placeholder="更详细的提示..." rows="2"></textarea>
                        <button class="voice-small-btn" onclick="startVoiceInput('task-hint')">🎤</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>目标描述（AI识别用）</label>
                    <div class="input-with-voice">
                        <textarea id="task-target" placeholder="描述目标外观特征..." rows="2"></textarea>
                        <button class="voice-small-btn" onclick="startVoiceInput('task-target')">🎤</button>
                    </div>
                </div>

                <!-- 拍照 -->
                <div class="photo-section">
                    <label>📷 参考照片</label>
                    <div class="photo-area" onclick="document.getElementById('photo-input').click()">
                        <input type="file" id="photo-input" accept="image/*" capture="environment" onchange="onPhotoSelected(event)" style="display:none">
                        <div id="photo-placeholder" class="photo-placeholder">
                            <span class="camera-icon">📷</span>
                            <p>点击拍照</p>
                        </div>
                        <img id="photo-preview" class="photo-preview hidden">
                    </div>
                </div>

                <button class="btn-primary" onclick="saveTaskPoint()">💾 保存任务点</button>
            </div>

            <!-- 已保存 -->
            <div style="margin-top:30px;">
                <h3>📋 已保存 (<span id="saved-count">0</span>)</h3>
                <div id="saved-list" style="margin-top:15px;">
                    <p class="empty-hint">暂无任务点</p>
                </div>
                <button class="btn-upload" onclick="uploadAll()" id="upload-btn" disabled>☁️ 上传到云端</button>
            </div>
        </div>

        <!-- 语音弹窗 -->
        <div id="voice-modal" class="modal hidden">
            <div class="modal-content">
                <div class="voice-wave" id="voice-wave">🎤</div>
                <p>正在聆听...</p>
                <p class="voice-result" id="voice-result"></p>
                <button class="btn-cancel" onclick="cancelVoice()">取消</button>
            </div>
        </div>

        <!-- 加载 -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p id="loading-text" style="margin-top:15px;color:var(--text-secondary);">处理中...</p>
        </div>

        <!-- 提示 -->
        <div id="toast" class="toast hidden"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
