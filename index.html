<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParkQuest 踩点助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #fff;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #00d4ff;
            margin-bottom: 20px;
        }
        .header h1 {
            color: #00d4ff;
            font-size: 2rem;
        }
        .panel {
            background: #12121a;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #1e1e2e;
        }
        .hidden { display: none !important; }
        input, textarea {
            width: 100%;
            padding: 12px;
            background: #0a0a0f;
            border: 1px solid #1e1e2e;
            border-radius: 8px;
            color: #fff;
            margin: 10px 0;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00d4ff 0%, #00a8cc 100%);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
        }
        button:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }
        .gps-box {
            background: rgba(0,212,255,0.1);
            border: 1px solid #00d4ff;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 15px;
        }
        .task-item {
            background: #1a1a2e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        #toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #00d4ff;
            color: #000;
            padding: 15px 30px;
            border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎯 ParkQuest</h1>
        <p>踩点助手 v2.0</p>
    </div>

    <!-- 配置页 -->
    <div id="config-panel" class="panel">
        <h3>⚙️ 配置</h3>
        <input type="text" id="qwen-key" placeholder="通义千问 API Key (可选)">
        <button onclick="startApp()">启动系统</button>
    </div>

    <!-- 主界面 -->
    <div id="main-panel" class="panel hidden">
        <div class="gps-box">
            <p id="gps-status">📍 点击获取位置</p>
            <p id="gps-coords" style="font-size: 0.8rem; color: #888; margin-top: 5px;">--</p>
            <button onclick="getGPS()" style="margin-top: 10px; padding: 8px;">获取 GPS</button>
        </div>

        <h3 style="color: #00d4ff; margin-bottom: 15px;">📝 任务点信息</h3>
        <input type="text" id="task-name" placeholder="任务点名称">
        <input type="text" id="task-clue" placeholder="线索提示">
        <textarea id="task-hint" rows="2" placeholder="详细提示"></textarea>
        <textarea id="task-target" rows="2" placeholder="目标描述（AI识别用）"></textarea>

        <div style="margin: 15px 0;">
            <input type="file" id="photo-input" accept="image/*" capture="environment" onchange="loadPhoto(event)">
            <img id="photo-preview" style="width: 100%; max-height: 200px; object-fit: cover; border-radius: 8px; display: none; margin-top: 10px;">
        </div>

        <button onclick="saveTask()">💾 保存任务点</button>

        <div style="margin-top: 30px;">
            <h3 style="color: #00d4ff; margin-bottom: 15px;">📋 已保存 (<span id="count">0</span>)</h3>
            <div id="task-list"></div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        // 全局变量
        let currentPos = null;
        let tasks = [];
        let currentPhoto = null;

        // 启动应用
        function startApp() {
            document.getElementById('config-panel').classList.add('hidden');
            document.getElementById('main-panel').classList.remove('hidden');
            showToast('系统启动成功！');
        }

        // 获取 GPS
        function getGPS() {
            document.getElementById('gps-status').textContent = '📍 定位中...';

            if (!navigator.geolocation) {
                showToast('❌ 浏览器不支持定位');
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    currentPos = {
                        lat: pos.coords.latitude.toFixed(6),
                        lng: pos.coords.longitude.toFixed(6)
                    };
                    document.getElementById('gps-status').textContent = '✓ 定位成功';
                    document.getElementById('gps-coords').textContent =
                        `${currentPos.lat}, ${currentPos.lng} (精度: ${Math.round(pos.coords.accuracy)}米)`;
                    showToast('📍 定位成功！');
                },
                (err) => {
                    showToast('❌ 定位失败: ' + err.message);
                    document.getElementById('gps-status').textContent = '❌ 定位失败，请检查权限';
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        // 加载照片
        function loadPhoto(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (evt) => {
                currentPhoto = evt.target.result;
                document.getElementById('photo-preview').src = currentPhoto;
                document.getElementById('photo-preview').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        // 保存任务
        function saveTask() {
            if (!currentPos) {
                showToast('❌ 请先获取 GPS 位置');
                return;
            }

            const name = document.getElementById('task-name').value.trim();
            if (!name) {
                showToast('❌ 请填写任务点名称');
                return;
            }

            const task = {
                id: Date.now(),
                name: name,
                clue: document.getElementById('task-clue').value,
                hint: document.getElementById('task-hint').value,
                target: document.getElementById('task-target').value,
                lat: currentPos.lat,
                lng: currentPos.lng,
                photo: currentPhoto,
                time: new Date().toLocaleString()
            };

            tasks.push(task);
            updateTaskList();
            clearForm();
            showToast('✅ 保存成功！');
        }

        // 更新列表
        function updateTaskList() {
            document.getElementById('count').textContent = tasks.length;
            const list = document.getElementById('task-list');

            if (tasks.length === 0) {
                list.innerHTML = '<p style="color: #666; text-align: center;">暂无任务点</p>';
                return;
            }

            list.innerHTML = tasks.map(t => `
                <div class="task-item">
                    <h4>${t.name}</h4>
                    <p style="font-size: 0.8rem; color: #888;">${t.lat}, ${t.lng}</p>
                    ${t.photo ? '<p>📷 有照片</p>' : ''}
                    <button onclick="deleteTask(${t.id})" style="margin-top: 10px; background: #ff3366;">删除</button>
                </div>
            `).join('');
        }

        // 删除任务
        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            updateTaskList();
            showToast('已删除');
        }

        // 清空表单
        function clearForm() {
            document.getElementById('task-name').value = '';
            document.getElementById('task-clue').value = '';
            document.getElementById('task-hint').value = '';
            document.getElementById('task-target').value = '';
            document.getElementById('photo-input').value = '';
            document.getElementById('photo-preview').style.display = 'none';
            currentPhoto = null;
        }

        // 显示提示
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
